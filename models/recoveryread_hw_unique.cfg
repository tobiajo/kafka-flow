\* spec: RecoveryRead
\* expect: HOLDS
\* flags: -deadlock
\* Remedy (1): keep unique ids, bound the read at the high watermark (captured through an
\* uncommitted-isolation lens). The read_committed position cannot pass A's open transaction, so the
\* read WAITS until the broker's timeout aborts it, then completes with every committed record.
\* Kafka Streams' restore shape (KAFKA-10167) -- mandatory there, since eos-v2 ids are per-process
\* and no takeover ever aborts a dead instance's transaction (ext(K6)). Correct but pays the wait.
SPECIFICATION Spec
CONSTANTS StableId = FALSE  HwTarget = TRUE  Foreign = FALSE
INVARIANT TypeOK
INVARIANT INV_ReadCommittedOnly
INVARIANT INV_ReadsAllCommitted
PROPERTY Terminates
